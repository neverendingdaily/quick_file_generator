<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick File Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 16px; align-items: end; }
  input[type="text"], select, textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #111;
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus, textarea:focus { border-color: #2563EB; background: #fff; }
  select { min-width: 110px; cursor: pointer; }
  textarea {
    height: 260px;
    resize: vertical;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .charcount { font-size: 12px; color: #aaa; }
  .hint { font-size: 12px; color: #aaa; margin: 6px 0 16px; min-height: 16px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  button {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-family: inherit;
    background: #f5f5f5;
    color: #333;
    cursor: pointer;
    transition: background 0.12s;
  }
  button:hover { background: #ebebeb; }
  button:active { transform: scale(0.98); }
  .btn-download {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    background: #2563EB;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    letter-spacing: 0.01em;
  }
  .btn-download:hover { background: #1D4ED8; }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #222;
    color: #fff;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; }
    .card { background: #242424; box-shadow: none; border: 1px solid #333; }
    h1 { color: #f0f0f0; }
    .subtitle { color: #777; }
    label { color: #999; }
    input[type="text"], select, textarea {
      background: #1a1a1a;
      border-color: #383838;
      color: #f0f0f0;
    }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: #3b82f6; background: #1e1e1e; }
    button { background: #2e2e2e; border-color: #3a3a3a; color: #ccc; }
    button:hover { background: #383838; }
    .hint, .charcount { color: #555; }
    .toast { background: #f0f0f0; color: #111; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Quick File Generator</h1>
  <p class="subtitle">テキストを入力して好きな形式でダウンロード（オフライン対応）</p>

  <div class="row">
    <div>
      <label for="filename">ファイル名</label>
      <input type="text" id="filename" value="untitled" placeholder="ファイル名">
    </div>
    <div>
      <label for="format">形式</label>
      <select id="format">
        <option value="txt">.txt</option>
        <option value="md">.md</option>
        <option value="html">.html</option>
        <option value="csv">.csv</option>
        <option value="json">.json</option>
        <option value="xml">.xml</option>
        <option value="js">.js</option>
        <option value="css">.css</option>
        <option value="py">.py</option>
        <option value="sql">.sql</option>
      </select>
    </div>
  </div>

  <div class="meta-row">
    <label for="content" style="margin:0;">テキスト内容</label>
    <span class="charcount" id="charcount">0 文字</span>
  </div>
  <textarea id="content" placeholder="ここにテキストを入力...&#10;&#10;形式を選んで「テンプレ挿入」を押すと雛形が入ります。"></textarea>
  <div class="hint" id="hint">プレーンテキスト。メモや下書きに。</div>

  <div class="btn-row">
    <button id="btn-template">テンプレ挿入</button>
    <button id="btn-copy">コピー</button>
    <button id="btn-clear">クリア</button>
  </div>
  <button class="btn-download" id="btn-download">⬇ ファイルをダウンロード</button>
</div>

<div class="toast" id="toast"></div>

<script>
const hints = {
  txt:  'プレーンテキスト。メモや下書きに。',
  md:   'Markdown形式。見出し（#）、リスト（-）、太字（**）が使えます。',
  html: 'HTMLファイル。ブラウザで直接開けます。',
  csv:  'カンマ区切り。ExcelやGoogleスプレッドシートで開けます。',
  json: 'JSON形式。APIデータやconfig管理に。',
  xml:  'XML形式。データ交換・設定ファイルに。',
  js:   'JavaScriptファイル。',
  css:  'CSSスタイルシート。',
  py:   'Pythonスクリプト。',
  sql:  'SQLクエリファイル。'
};

const today = new Date().toLocaleDateString('ja-JP');
const templates = {
  txt:  '作成日: ' + today + '\n\n',
  md:   '# タイトル\n\n## はじめに\n\n内容をここに書く。\n\n## まとめ\n\n',
  html: '<!DOCTYPE html>\n<html lang="ja">\n<head>\n  <meta charset="UTF-8">\n  <title>タイトル</title>\n</head>\n<body>\n  <h1>タイトル</h1>\n  <p>本文</p>\n</body>\n</html>',
  csv:  '名前,値,備考\nサンプルA,100,テスト\nサンプルB,200,本番',
  json: '{\n  "name": "サンプル",\n  "version": "1.0",\n  "data": []\n}',
  xml:  '<?xml version="1.0" encoding="UTF-8"?>\n<root>\n  <item>\n    <name>サンプル</name>\n    <value>100</value>\n  </item>\n</root>',
  js:   '// ' + today + '\n\nfunction main() {\n  console.log("Hello, World!");\n}\n\nmain();',
  css:  '/* スタイルシート */\n\nbody {\n  margin: 0;\n  font-family: sans-serif;\n}\n',
  py:   '# -*- coding: utf-8 -*-\n"""\n作成日: ' + today + '\n"""\n\ndef main():\n    print("Hello, World!")\n\nif __name__ == "__main__":\n    main()\n',
  sql:  '-- クエリ\n-- 作成日: ' + today + '\n\nSELECT *\nFROM table_name\nWHERE 1=1\nLIMIT 100;\n'
};

const textarea = document.getElementById('content');
const formatSel = document.getElementById('format');
const hintEl   = document.getElementById('hint');
const countEl  = document.getElementById('charcount');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1800);
}

formatSel.addEventListener('change', () => {
  hintEl.textContent = hints[formatSel.value] || '';
});

textarea.addEventListener('input', () => {
  countEl.textContent = textarea.value.length.toLocaleString() + ' 文字';
});

document.getElementById('btn-template').addEventListener('click', () => {
  const fmt = formatSel.value;
  textarea.value = templates[fmt] || '';
  countEl.textContent = textarea.value.length.toLocaleString() + ' 文字';
  showToast(fmt + ' テンプレートを挿入しました');
});

document.getElementById('btn-copy').addEventListener('click', () => {
  if (!textarea.value) { showToast('テキストが空です'); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textarea.value)
      .then(() => showToast('コピーしました'))
      .catch(() => fallbackCopy());
  } else {
    fallbackCopy();
  }
});

function fallbackCopy() {
  textarea.select();
  document.execCommand('copy');
  showToast('コピーしました');
}

document.getElementById('btn-clear').addEventListener('click', () => {
  textarea.value = '';
  countEl.textContent = '0 文字';
  document.getElementById('filename').value = 'untitled';
  showToast('クリアしました');
});

document.getElementById('btn-download').addEventListener('click', () => {
  const name = document.getElementById('filename').value.trim() || 'untitled';
  const fmt  = formatSel.value;
  const text = textarea.value;
  if (!text) { showToast('テキストが空です'); return; }

  const mimeMap = {
    txt: 'text/plain', md: 'text/markdown', html: 'text/html',
    csv: 'text/csv', json: 'application/json', xml: 'application/xml',
    js: 'text/javascript', css: 'text/css', py: 'text/x-python', sql: 'text/x-sql'
  };
  const mime = mimeMap[fmt] || 'text/plain';
  const blob = new Blob([text], { type: mime + ';charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = name + '.' + fmt;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(name + '.' + fmt + ' をダウンロードしました');
});
</script>
</body>
</html>
